name: max_voice_assistant
description: "Max - AI Voice Assistant with Gemini API"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  speech_to_text: ^6.5.1
  flutter_tts: ^3.8.5
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  flutter_animate: ^4.3.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  avatar_glow: ^2.0.2
  permission_handler: ^11.0.1
  url_launcher: ^6.2.2
  intl: ^0.18.1
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
